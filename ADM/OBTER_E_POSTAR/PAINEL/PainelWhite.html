<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Simples De Vendas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#000;--bg:#000;--card:#fff}
body{font-family:Arial;background:var(--bg);}
header{background:var(--primary);color:#fff;padding:16px;text-align:center;font-size:22px;font-weight:bold;}
#produtos{padding:12px;}
.card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.08);}
.banner{position:relative;aspect-ratio:16/9;}
.banner img{width:100%;height:100%;object-fit:cover;}
.controle{position:absolute;bottom:10px;right:10px;background:#fff;border-radius:30px;display:flex;align-items:center;gap:8px;padding:5px 10px;box-shadow:0 4px 10px rgba(0,0,0,.3);}
.controle button{border:none;background:var(--primary);color:#fff;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;}
.qtd{font-weight:bold;min-width:20px;text-align:center;}
.info{padding:12px;display:flex;justify-content:space-between;}
#carrinho{background:#fff;margin:12px;padding:12px;border-radius:12px;}
.item{display:flex;justify-content:space-between;margin:6px 0;}
.searchBox{display:flex;align-items:center;background:#000;padding:10px 12px;border-radius:10px;margin:10px;}
.searchBox:focus-within{border:1px solid #25D366;box-shadow:0 0 5px rgba(37,211,102,0.6);transform:scale(1.02);background:#000;}
.searchBox input{flex:1;border:none;outline:none;font-size:14px;padding:0;background:#000;color:#fff;}
.searchBox input::placeholder{color:#fff;opacity:1;}
.icon{width:20px;margin-right:8px;color:#fff;}
.clearBtn{border:none;background:#eee;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.clearBtn:hover{ background:#ddd; }
.form input{background:#000;color:#fff;border:1px solid #444;border-radius:8px;padding:10px;font-size:14px;outline:none;width:100%;box-sizing:border-box;transition:0.3s;}
.form input:focus{border:1px solid #25D366;box-shadow:0 0 5px rgba(37,211,102,0.6);}
.form input::placeholder{color:#fff;opacity:0.7;}
#totalBox{margin:12px;background:#fff3f4;border:2px dashed var(--primary);padding:12px;border-radius:10px;text-align:center;font-weight:bold;}
.form{padding:12px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;font-size:16px;background:#000;color:#fff;}
select:focus{border:1px solid #25D366;box-shadow:0 0 5px rgba(37,211,102,0.6);}
#pixBox{display:none;background:#fff;padding:12px;margin:12px;border-radius:12px;text-align:center;}
#pixCode{word-break:break-all;font-size:12px;}
button{cursor:pointer;}
.copyBtn{margin-top:6px;padding:8px 12px;background:#333;color:#fff;border:none;border-radius:6px;}
#btnFinalizar{position:fixed;bottom:15px;right:15px;background:#25D366;color:#fff;border:none;padding:14px 18px;border-radius:8px;font-weight:bold;cursor:pointer;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.pop{animation:pop .3s;}
</style>
</head>

<body>

<header>Paty Vendas Online</header>

<div class="searchBox">
<svg class="icon" viewBox="0 0 24 24">
<path d="M21 21l-4.3-4.3m1.3-5.2a6.5 6.5 0 11-13 0 6.5 6.5 0 0113 0z"
stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
<input type="text" id="buscar" placeholder="Buscar produtos..." onkeyup="buscarProduto()">
<button class="clearBtn" onclick="limparBusca()">✕</button>
</div>

<div id="produtos"></div>

<div id="carrinho">
<h3>🧾 Seu pedido</h3>
<div id="listaCarrinho">Carrinho vazio</div>
</div>

<div id="totalBox">
Total: R$ <span id="total">0.00</span>
</div>

<div class="form">
<input id="nome" placeholder="Seu nome">
<input id="endereco" placeholder="Seu endereço">
<select id="pagamento" onchange="verPagamento()">
<option value="">Forma de pagamento</option>
<option value="pix">Pix</option>
<option value="dinheiro">Dinheiro</option>
</select>
<div id="trocoBox" style="display:none">
<input id="troco" placeholder="Troco para quanto?">
</div>
</div>

<div id="pixBox">
<h3>Pagar com Pix</h3>
<img id="qrPix" width="200">
<p id="pixCode"></p>
<button class="copyBtn" onclick="copiarPix()">Copiar Pix</button>
</div>

<button id="btnFinalizar" onclick="enviarPedido()">Finalizar Pedido</button>

<script>
// CONFIGURAÇÕES
const chavePix="05255555959";
const cidade="RIO DE JANEIRO";
const nomeRecebedor="Patricia Ribeiro Martins";
const telefoneWhatsapp = "5548984182723";
let numeroPedido=Math.floor(Math.random()*9000)+1000;

// VARIÁVEIS
let produtos = [];
let carrinho = {};
const produtosDiv = document.getElementById("produtos");
const lista = document.getElementById("listaCarrinho");
const totalSpan = document.getElementById("total");

// ==================== FUNÇÕES ====================

function renderProdutos(){
  let html="";
  produtos.forEach((p,i)=>{
    html+=`
    <div class="card">
      <div class="banner">
        <img src="${p.img}">
        <div class="controle">
          <button onclick="remover(${i})">-</button>
          <span class="qtd">${carrinho[i]||0}</span>
          <button onclick="add(${i})">+</button>
        </div>
      </div>
      <div class="info">
        <b>${p.nome}</b>
        <span>R$ ${p.preco.toFixed(2)}</span>
      </div>
    </div>`;
  });
  produtosDiv.innerHTML = html;
}

function add(i){ carrinho[i]=(carrinho[i]||0)+1; atualizar(); renderProdutos(); if(document.getElementById("pagamento").value=="pix") gerarPix(parseFloat(totalSpan.textContent)); }
function remover(i){ if(!carrinho[i]) return; carrinho[i]--; if(carrinho[i]<=0) delete carrinho[i]; atualizar(); renderProdutos(); if(document.getElementById("pagamento").value=="pix") gerarPix(parseFloat(totalSpan.textContent)); }
function atualizar(){ let total=0,html=""; for(let i in carrinho){ let qtd=carrinho[i],p=produtos[i],sub=qtd*p.preco; total+=sub; html+=`<div class="item">${qtd}x ${p.nome}<span>R$ ${sub.toFixed(2)}</span></div>`;} lista.innerHTML=html||"Carrinho vazio"; totalSpan.textContent=total.toFixed(2); if(document.getElementById("pagamento").value=="pix") gerarPix(total);}
function buscarProduto(){ let texto=document.getElementById("buscar").value.toLowerCase(); document.querySelectorAll(".card").forEach(card=>{ let nome=card.querySelector("b").innerText.toLowerCase(); card.style.display=nome.includes(texto)?"block":"none"; });}
function limparBusca(){ document.getElementById("buscar").value=""; buscarProduto();}
function verPagamento(){ let p=document.getElementById("pagamento").value; document.getElementById("trocoBox").style.display=p=="dinheiro"?"block":"none"; if(p=="pix") gerarPix(parseFloat(totalSpan.textContent)); }

// ================= PIX =================
function montarCampo(id, valor){ return id + valor.length.toString().padStart(2,'0') + valor; }
function crc16(payload){ let polinomio=0x1021, resultado=0xFFFF; for(let i=0;i<payload.length;i++){ resultado^=payload.charCodeAt(i)<<8; for(let bit=0;bit<8;bit++){ if((resultado<<=1)&0x10000) resultado^=polinomio; } } return (resultado&0xFFFF).toString(16).toUpperCase().padStart(4,'0'); }
function gerarPix(valor){ if(!valor||valor<=0){ alert("Adicione produtos antes de gerar o PIX"); return;} const gui=montarCampo("00","BR.GOV.BCB.PIX"); const chave=montarCampo("01",chavePix); const merchantAccount=montarCampo("26",gui+chave); const payloadSemCRC=montarCampo("00","01")+merchantAccount+montarCampo("52","0000")+montarCampo("53","986")+montarCampo("54",valor.toFixed(2))+montarCampo("58","BR")+montarCampo("59",nomeRecebedor)+montarCampo("60",cidade)+montarCampo("62",montarCampo("05","***"))+"6304"; const payloadFinal=payloadSemCRC+crc16(payloadSemCRC); document.getElementById("pixCode").innerText=payloadFinal; document.getElementById("qrPix").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(payloadFinal); document.getElementById("pixBox").style.display="block"; }
function copiarPix(){ navigator.clipboard.writeText(document.getElementById("pixCode").innerText); alert("Pix copiado!");}

// ================= PEDIDO =================
function enviarPedido(){ let nome=document.getElementById("nome").value; let endereco=document.getElementById("endereco").value; let pagamento=document.getElementById("pagamento").value; if(!nome||!endereco){alert("Preencha Nome e Endereço");return;} let total=totalSpan.textContent; let msg=`🍱 Pedido #${numeroPedido}\n`; for(let i in carrinho){ let qtd=carrinho[i],p=produtos[i]; msg+=`${qtd}x ${p.nome} = R$ ${(qtd*p.preco).toFixed(2)}\n`; } msg+=`Total: R$ ${total}\nPagamento: ${pagamento}\n`; if(pagamento=="dinheiro"){ let troco=document.getElementById("troco").value; if(troco) msg+=`Troco para: R$ ${troco}\n`; } msg+=`Cliente: ${nome}\nEndereço: ${endereco}\n`; const link="https://api.whatsapp.com/send?phone="+telefoneWhatsapp+"&text="+encodeURIComponent(msg); window.open(link,"_blank"); }

// ================= FETCH JSON COM PROXY =================
// Basta trocar essa URL pelo link do seu JSON (RAW GitHub, Pastebin, GitHub Pages)
const LINK_JSON = "https://eduzinks23.github.io/-eduteste-api-com-json-/ADM/OBTER_E_POSTAR/JSON/FormatoJson.json"; // Coloque seu link
const JSON_URL = `https://corsproxy.io/?${LINK_JSON}`; // Proxy CORS automático

fetch("https://eduzinks23.github.io/-eduteste-api-com-json-/ADM/OBTER_E_POSTAR/JSON/Produtos.json")
  .then(res=>res.json())
  .then(data=>{
    produtos = data;
    renderProdutos();
  })
  .catch(err=>{
    console.error("Não foi possível carregar os produtos",err);
    alert("Erro ao carregar produtos do JSON");
  });
</script>

</body>
</html>

<!DOCTYPE html>

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{
--primary:#000000;
--bg:#000000;
--card:#fff;
}

body{
font-family:Arial;
background:var(--bg);
}

/* HEADER */

header{
background:var(--primary);
color:#fff;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* PRODUTOS */

#produtos{
padding:12px;
}

.card{
background:#fff;
border-radius:14px;
overflow:hidden;
margin-bottom:14px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.banner{
position:relative;
aspect-ratio:16/9;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTROLE */

.controle{
position:absolute;
bottom:10px;
right:10px;
background:#fff;
border-radius:30px;
display:flex;
align-items:center;
gap:8px;
padding:5px 10px;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.controle button{
border:none;
background:var(--primary);
color:#fff;
width:28px;
height:28px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.qtd{
font-weight:bold;
min-width:20px;
text-align:center;
}

/* INFO */

.info{
padding:12px;
display:flex;
justify-content:space-between;
}

/* CARRINHO */

#carrinho{
background:#fff;
margin:12px;
padding:12px;
border-radius:12px;
}

.item{
display:flex;
justify-content:space-between;
margin:6px 0;

/*BUSCAR ITENS */

.searchBox{

display:flex;
align-items:center;
background:#000;
padding:10px 12px;
border-radius:10px;
margin:10px;
box-shadow:0.0px 0px rgba(0,0,0,.00);

}

.searchBox:focus-within{

box-shadow:0.0px 0px rgba(0,0,0,0);
transform:scale(1.02);

}

.searchBox input{
  flex:1;
  border:none;
  outline:none;
  font-size:14px;
  padding:0px;

  color:#fff; /* texto digitado */

/* placeholder padrão */
.searchBox input::placeholder{
  color:#fff;
  opacity:1;
}

/* Chrome / Safari / Android */
.searchBox input::-webkit-input-placeholder{
  color:#fff;
}

/* Firefox */
.searchBox input::-moz-placeholder{
  color:#fff;
}

/* Edge antigo */
.searchBox input:-ms-input-placeholder{
  color:#fff;
}



.icon{

width:20px;
margin-right:8px;
color:#fff;

}

.clearBtn{

border:none;
background:#eee;
width:20px;
height:20px;
border-radius:50%;
cursor:pointer;
font-size:14px;
display:flex;
align-items:center;
justify-content:center;

}

.clearBtn:hover{

background:#ddd;

}




/* cor da dica (placeholder) */
.placeholder{
  color:#fff;
  opacity:0.7; /* deixa um pouco mais suave */
}









/* TODOS INPUTS DO SITE */
input{

  color:#fff;            /* texto digitado branco */

  padding:10px;
  font-size:14px;
  outline:none;
  width:100%;

/* Efeito quando clica */
input:focus{
  border:1px solid #25D366;
  box-shadow:0 0 5px rgba(37,211,102,0.6);
}

/* Texto de dica (placeholder) */
input::placeholder{
  color:#fff;
  opacity:0.7;
}

/* Compatibilidade mobile */
input::-webkit-input-placeholder{
  color:#fff;
}

input::-moz-placeholder{
  color:#fff;
}

input:-ms-input-placeholder{
  color:#fff;

padding:10px;

margin:12px;

color:#fff;

  background:#25D366;
  color:#fff;
  border:none;
  padding:14px 18px;
  border-radius:8px;
  font-weight:bold;

/* ANIMAÃ‡ÃƒO */

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.pop{
animation:pop .3s;

</style>

function montarCampo(id, valor){
  return id + valor.length.toString().padStart(2,'0') + valor;
}

function crc16(payload){
  let polinomio = 0x1021;
  let resultado = 0xFFFF;

  for(let i=0;i<payload.length;i++){
    resultado ^= payload.charCodeAt(i) << 8;
    for(let bit=0;bit<8;bit++){
      if((resultado <<= 1) & 0x10000){
        resultado ^= polinomio;
      }
    }
  }
  return (resultado & 0xFFFF).toString(16).toUpperCase().padStart(4,'0');
}

function gerarPix(valor){

  if(!valor || valor <= 0){
    alert("Adicione produtos antes de gerar o PIX");
    return;
  }

  const gui = montarCampo("00","BR.GOV.BCB.PIX");
  const chave = montarCampo("01", chavePix);
  const merchantAccount = montarCampo("26", gui + chave);

  const payloadSemCRC =
    montarCampo("00","01") +
    merchantAccount +
    montarCampo("52","0000") +
    montarCampo("53","986") +
    montarCampo("54", valor.toFixed(2)) +
    montarCampo("58","BR") +
    montarCampo("59", nomeRecebedor) +
    montarCampo("60", cidade) +
    montarCampo("62", montarCampo("05","***")) +
    "6304";

  const payloadFinal = payloadSemCRC + crc16(payloadSemCRC);

  document.getElementById("pixCode").innerText = payloadFinal;

  document.getElementById("qrPix").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" +
    encodeURIComponent(payloadFinal);

  document.getElementById("pixBox").style.display = "block";
}





function copiarPix(){

let code=document.getElementById("pixCode").innerText

navigator.clipboard.writeText(code)

alert("Pix copiado!")

}

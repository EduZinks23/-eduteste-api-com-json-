<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{
--primary:#ea1d2c;
--bg:#f5f5f5;
--card:#fff;
--bg--fundo:#fff;
}

body{
font-family:Arial;
background:var(--bg--fundo);
}

/* HEADER */

header{
background:var(--primary);
color:#fff;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* PRODUTOS */

#produtos{
padding:12px;
color:#fff;
}

.card{
background: linear-gradient(135deg, #fff, #fff);
color:#fff;
border-radius:14px;
overflow:hidden;
margin-bottom:14px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
border:0px solid #000;
}

.banner{
position:relative;
aspect-ratio:16/9;
background: linear-gradient(
  135deg,
  #fff6b7,
  #f0c419,
  #fff2a8,
  #d4af37,
  #b8962e
);
color:#000;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTROLE */

.controle{
position:absolute;
bottom:10px;
right:10px;
background:var(--primary);
border-radius:30px;
display:flex;
align-items:center;
gap:8px;
padding:5px 10px;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.controle button{
border:none;
background:#fff;
color:var(--primary);
width:28px;
height:28px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.qtd{
font-weight:bold;
min-width:20px;
text-align:center;
color:#fff;
}

/* INFO */

.info{
padding:12px;

}

/* CARRINHO */

}

.item{

padding:0px;

/* Chrome / Safari / Android */

/* Firefox */
.searchBox input::-moz-placeholder{
  color:#fff;
}

/* Edge antigo */

  color:#fff;

/* cor da dica (placeholder) */
.placeholder{
  color:#fff;
  opacity:0.7; /* deixa um pouco mais suave */

.icon{

width:20px;
margin-right:8px;

height:20px;

function montarCampo(id, valor){
  return id + valor.length.toString().padStart(2,'0') + valor;
}

function crc16(payload){
  let polinomio = 0x1021;
  let resultado = 0xFFFF;

  for(let i=0;i<payload.length;i++){
    resultado ^= payload.charCodeAt(i) << 8;
    for(let bit=0;bit<8;bit++){
      if((resultado <<= 1) & 0x10000){
        resultado ^= polinomio;
      }
    }
  }
  return (resultado & 0xFFFF).toString(16).toUpperCase().padStart(4,'0');
}

function gerarPix(valor){

  if(!valor || valor <= 0){
    alert("Adicione produtos antes de gerar o PIX");
    return;
  }

  const gui = montarCampo("00","BR.GOV.BCB.PIX");
  const chave = montarCampo("01", chavePix);
  const merchantAccount = montarCampo("26", gui + chave);

  const payloadSemCRC =
    montarCampo("00","01") +
    merchantAccount +
    montarCampo("52","0000") +
    montarCampo("53","986") +
    montarCampo("54", valor.toFixed(2)) +
    montarCampo("58","BR") +
    montarCampo("59", nomeRecebedor) +
    montarCampo("60", cidade) +
    montarCampo("62", montarCampo("05","***")) +
    "6304";

  const payloadFinal = payloadSemCRC + crc16(payloadSemCRC);

  document.getElementById("pixCode").innerText = payloadFinal;

  document.getElementById("qrPix").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" +
    encodeURIComponent(payloadFinal);

  document.getElementById("pixBox").style.display = "block";
}

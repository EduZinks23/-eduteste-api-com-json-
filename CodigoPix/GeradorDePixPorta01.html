<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador Pix</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}







input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#00a859;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

#resultado{
margin-top:15px;
word-break:break-all;
font-size:13px;
background:#eee;
padding:10px;
border-radius:6px;
}


img{
display:block;
margin:15px auto;
}




</style>
</head>

<body>

<div class="box">

<h2>Gerador Pix</h2>

<input id="chave" placeholder="Chave Pix">

<input id="nome" placeholder="Nome Recebedor">

<input id="cidade" placeholder="Cidade">

<input id="valor" placeholder="Valor (ex: 10.50)">

<button onclick="gerar()">Gerar Pix</button>

<div id="resultado"></div>

<img id="qr">

</div>

<script>

function campo(id,valor){
return id+valor.length.toString().padStart(2,'0')+valor
}

function crc16(payload){

let polinomio=0x1021
let resultado=0xFFFF

for(let i=0;i<payload.length;i++){

resultado ^= payload.charCodeAt(i)<<8

for(let bit=0;bit<8;bit++){

resultado <<=1

if(resultado & 0x10000){
resultado ^= polinomio
}

resultado &=0xFFFF

}

}

return resultado.toString(16).toUpperCase().padStart(4,'0')

}

function gerar(){

let chave=document.getElementById("chave").value
let nome=document.getElementById("nome").value.toUpperCase()
let cidade=document.getElementById("cidade").value.toUpperCase()
let valor=document.getElementById("valor").value

if(valor) valor=parseFloat(valor).toFixed(2)

let gui=campo("00","BR.GOV.BCB.PIX")
let chavePix=campo("01",chave)

let merchant=campo("26",gui+chavePix)

let payload=
campo("00","01")+
merchant+
campo("52","0000")+
campo("53","986")+
(valor?campo("54",valor):"")+
campo("58","BR")+
campo("59",nome)+
campo("60",cidade)+
campo("62",campo("05","***"))+
"6304"

let crc=crc16(payload)

let codigo=payload+crc

document.getElementById("resultado").innerText=codigo

document.getElementById("qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(codigo)

}

</script>

</body>
</html>

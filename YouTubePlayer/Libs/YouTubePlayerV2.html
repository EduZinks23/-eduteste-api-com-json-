<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./styles.css">
<style type="text/css">* {user-select: auto !important; -webkit-user-select: auto !important;}</style><input type="hidden" id="inject_idm_text_selection"><style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

    .pp-widget * { box-sizing: border-box; margin: 0; padding: 0; }
    .pp-widget a { text-decoration: none; cursor: pointer; }

    .pp-btn-yt, .pp-btn-ig {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace !important;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 3px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }
    .pp-btn-yt {
      background: rgb(255 0 0 / 9%);
      border-color: rgb(255 0 0 / 25%);
      color: #ffffff;
    }
    .pp-btn-yt:hover {
      background: rgb(255 0 0 / 16%);
      border-color: rgb(255 0 0 / 56%);
    }
    .pp-btn-ig {
      background: linear-gradient(135deg, rgb(131 58 180 / 14%), rgb(225 48 108 / 14%), rgb(253 121 36 / 14%));
      border-color: rgb(225 48 108 / 30%);
      color: #f0ede6;
    }
    .pp-btn-ig:hover {
      background: linear-gradient(135deg, rgb(131 58 180 / 25%), rgb(225 48 108 / 25%), rgb(253 121 36 / 25%));
      border-color: rgb(225 48 108 / 60%);
      color: #ffffff;
    }
    .pp-close {
      background: rgba(240,237,230,0.1);
      border: 1px solid rgba(240,237,230,0.3);
      color: #f0ede6;
      cursor: pointer;
      border-radius: 3px;
      font-family: 'DM Mono', monospace !important;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.2s;
      line-height: 1;
    }
    .pp-close:hover {
      background: rgba(240,237,230,0.2);
      border-color: rgba(240,237,230,0.55);
      color: #ffffff;
    }
    @media (prefers-reduced-motion: reduce) {
      .pp-widget, .pp-widget * { animation: none !important; transition: none !important; }
    }
  
      /* ГўвЂќв‚¬ГўвЂќв‚¬ Toast wrapper ГўвЂќв‚¬ГўвЂќв‚¬ */
      .pp-toast {
        position: fixed;
        top: 20px; left: 50%;
        transform: translateX(-50%) translateY(-140%);
        z-index: 2147483647;
        background: #0a0a0a;
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        border: 1px solid rgba(240,237,230,0.08);
        border-radius: 6px;
        overflow: hidden;
        width: min(600px, calc(100vw - 32px));
        opacity: 0;
        transition: transform 0.55s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
        box-shadow: 0 10px 50px rgba(0,0,0,0.55), 0 0 0 1px rgba(200,255,0,0.07);
        display: flex;
        flex-direction: column;
      }
      .pp-toast.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .pp-toast.hiding {
        transform: translateX(-50%) translateY(-140%);
        opacity: 0;
      }

      /* ГўвЂќв‚¬ГўвЂќв‚¬ Row 1: stripe + brand + actions ГўвЂќв‚¬ГўвЂќв‚¬ */
      .pp-toast-row1 {
        display: flex;
        align-items: stretch;
        border-bottom: 1px solid rgba(240,237,230,0.08);
      }

      .pp-toast-stripe {
        width: 3px; flex-shrink: 0;
        background: #b1b2ae;
      }

      .pp-toast-brand {
        padding: 14px 18px;
        display: flex; flex-direction: column;
        justify-content: center; gap: 3px;
        flex-shrink: 0;
        border-right: 1px solid rgba(240,237,230,0.08);
      }
      .pp-toast-brand-name {
        font-family: 'Bebas Neue', sans-serif !important;
        font-size: 1.5rem; line-height: 0.92;
        letter-spacing: 0.04em; color: #f0ede6;
      }
      .pp-toast-brand-name em { font-style: normal; color: #b1b2ae; }
      .pp-toast-brand-sub {
        font-family: 'DM Mono', monospace !important;
        font-size: 0.6rem; letter-spacing: 0.2em;
        text-transform: uppercase; color: rgba(213, 213, 213, 0.35);
      }

      .pp-toast-actions {
        flex: 1;
        padding: 10px 14px;
        display: flex; align-items: center;
        justify-content: flex-end; gap: 8px;
        flex-wrap: wrap;
      }
      .pp-toast-actions .pp-btn-yt,
      .pp-toast-actions .pp-btn-ig { padding: 9px 16px; white-space: nowrap; }
      .pp-toast-actions .pp-close  { padding: 9px 10px; display: flex; align-items: center; justify-content: center; }

      /* ГўвЂќв‚¬ГўвЂќв‚¬ Row 2: copy Гўв‚¬вЂќ full width ГўвЂќв‚¬ГўвЂќв‚¬ */
      .pp-toast-copy {
        padding: 11px 18px 14px;
        display: flex; flex-direction: column; gap: 4px;
      }
      .pp-toast-copy-head {
        font-family: 'DM Mono', monospace !important;
        font-size: 0.9rem; letter-spacing: 0.16em;
        text-transform: uppercase; color: #f0ede6;
        margin-bottom: 0.1rem;
      }
      .pp-toast-copy-sub {
        font-family: 'DM Mono', monospace !important;
        font-size: 0.8rem; letter-spacing: 0.14em;
        text-transform: uppercase; color: rgba(213, 213, 213, 0.35);
      }

      /* ГўвЂќв‚¬ГўвЂќв‚¬ Reopen tab Гўв‚¬вЂќ stays after close ГўвЂќв‚¬ГўвЂќв‚¬ */
      .pp-reopen {
        position: fixed;
        top: 0; left: 50%;
        transform: translateX(-50%) translateY(-100%);
        z-index: 2147483647;
        background: #0a0a0a;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-top: none;
        border-radius: 0 0 6px 6px;
        padding: 7px 18px 8px;
        display: flex; align-items: center; gap: 8px;
        cursor: pointer;
        opacity: 0;
        transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      }
      .pp-reopen.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .pp-reopen-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #b1b2ae;
        box-shadow: 0 0 6px #b1b2ae;
        flex-shrink: 0;
        animation: pp-pulse 2s ease-in-out infinite;
      }
      @keyframes pp-pulse {
        0%,100% { opacity:1; transform:scale(1); }
        50%      { opacity:0.4; transform:scale(0.7); }
      }
      .pp-reopen-label {
        font-family: 'DM Mono', monospace !important;
        font-size: 0.5rem; letter-spacing: 0.18em;
        text-transform: uppercase; color: rgba(213, 213, 213, 0.35);
        white-space: nowrap;
        transition: color 0.2s;
      }
      .pp-reopen:hover .pp-reopen-label { color: #f0ede6; }

      /* ГўвЂќв‚¬ГўвЂќв‚¬ Mobile ГўвЂќв‚¬ГўвЂќв‚¬ */
      @media (max-width: 520px) {
        .pp-toast { top: 0; border-radius: 0 0 6px 6px; border-top: none; }
        .pp-toast-actions { justify-content: flex-start; }
        .pp-toast-actions .pp-btn-yt,
        .pp-toast-actions .pp-btn-ig { flex: 1; justify-content: center; }
      }
    </style><script type="text/javascript" id="www-widgetapi-script" src="https://www.youtube.com/s/player/8456c9de/www-widgetapi.vflset/www-widgetapi.js" async=""></script><script src="https://www.youtube.com/iframe_api"></script></head>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Profile</title>

<style>
:root {
    --bg-main: #000000;
    --bg-card: #0e0e10;
    --border: #1f1f23;
    --text-main: #ffffff;
    --text-muted: #b5b5b5;
    --ig-pink: #e1306c;
    --ig-purple: #833ab4;
    --ig-blue: #1da1f2;
}

body {
    margin: 0;
    padding: 20px;
    background: var(--bg-main);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

.container {
    max-width: 420px;
    margin: auto;
}

.title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 18px;
}

.search {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
}

.search input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-main);
    font-size: 16px;
}

.search input::placeholder {
    color: var(--text-muted);
}

.search button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, var(--ig-pink), var(--ig-purple));
    color: #fff;
}

.profile {
    display: none;
    margin-top: 20px;
    background: var(--bg-card);
    border: 0px solid var(--border);
    border-radius: 0px;
    padding: 18px;
}

.avatar {
    width: 0px;
    height: 0px;
    border-radius: 50%;
    margin: auto;
    display: block;
    background: #111;
    object-fit: cover;
}

.username {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    margin-top: 12px;
}

.status {
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 6px;
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
}

.actions button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
}

.app {
    background: linear-gradient(135deg, var(--ig-pink), var(--ig-purple));
    color: #fff;
}

.web {
    background: #1f1f23;
    color: #fff;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Instagram Profile</div>

    <div class="search">
        <input id="q" placeholder="Digite @usuario">
        <button onclick="gerarPerfil()">Buscar</button>
    </div>

    <div class="profile" id="profile">
        <img id="avatar" class="avatar">
        <div class="username" id="username"></div>
        <div class="status" id="status"></div>

        <div class="actions">
            <button class="app" onclick="abrirApp()">Aplicativo</button>
            <button class="web" onclick="abrirWeb()">Navegador</button>
        </div>
    </div>
</div>

<script>
function gerarPerfil() {
    let q = document.getElementById("q").value.trim();
    if (!q) return alert("Digite um usuário");

    q = q.replace("@", "").toLowerCase();

    const valido = /^[a-zA-Z0-9._]{1,30}$/.test(q);

    const profile = document.getElementById("profile");
    const username = document.getElementById("username");
    const status = document.getElementById("status");
    const avatar = document.getElementById("avatar");

    profile.style.display = "block";
    username.innerText = "@" + q;

    if (!valido) {
        status.innerText = "❌ Usuário inválido";
        avatar.src = "";
        return;
    }

    status.innerText = "✔ Perfil válido (dados exibidos no Instagram)";
    avatar.src = "";
}

function abrirApp() {
    const user = document.getElementById("username").innerText.replace("@","");
    window.location.href = "instagram://user?username=" + user;

    setTimeout(abrirWeb, 1200);
}

function abrirWeb() {
    const user = document.getElementById("username").innerText.replace("@","");
    window.location.href = "https://www.instagram.com/" + user;
}
</script>

</body>
</html>

<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Neo</title>
<style>
:root{
  --bg:#050d10;
  --card:#0f1c22;
  --accent:#25D366;
  --accent-2:#1DA851;
  --text:#e9edef;
  --muted:#8a9aa5;
  --danger:#ff3b30;
}.light{ --bg:#f2f5f7; --card:#ffffff; --text:#0b141a; --muted:#667781; }

*{box-sizing:border-box}

body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; transition:.3s; }

header{ width:100%; padding:16px; display:flex; justify-content:space-between; align-items:center; font-weight:700; }

header button{ background:transparent; color:var(--text); font-size:14px; }

.app{width:100%;max-width:420px;padding:16px}

.card{ background:var(--card); border-radius:18px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.15); display:grid; gap:14px; }

input{ width:100%; padding:14px 16px; border-radius:14px; border:1px solid #ccc; background:transparent; color:var(--text); }

.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}

button{ padding:14px; border-radius:14px; border:none; font-weight:700; cursor:pointer; transition:.25s; }

button:hover{transform:translateY(-2px)} button:active{transform:scale(.95)}

.send-now{grid-column:1/3;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff} .add{background:#e9edef;color:#111} .light .add{background:#d1d7db} .paste{background:transparent;color:var(--muted)}

.list{margin-top:18px;display:grid;gap:14px}

.item{ background:var(--card); border-radius:18px; padding:14px; display:grid; gap:10px; animation:pop .4s ease; }

@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.logo{width:32px;height:32px;margin:auto} .phone{font-size:13px;color:var(--muted);text-align:center} .message{text-align:center}

.item-actions{display:flex;gap:10px} .item-actions button{flex:1} .send{background:var(--accent);color:#fff} .remove{background:var(--danger);color:#fff}

.toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card); color:var(--text); padding:12px 18px; border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.3); opacity:0; transition:.3s; z-index:999; } .toast.show{opacity:1;transform:translateX(-50%) translateY(0)} </style>

</head>
<body>
<header>
  <span>WhatsApp Neo</span>
  <button onclick="toggleTheme()">ðŸŒ™ / â˜€ï¸</button>
</header><div class="app">
  <div class="card">
    <input id="phone" placeholder="NÃºmero (opcional)" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <input id="message" placeholder="Mensagem"><div class="actions">
  <button class="send-now" onclick="sendNow()">Enviar agora</button>
  <button class="add" onclick="addMessage()">Adicionar Ã  lista</button>
  <button class="paste" onclick="pasteNumber()">Colar nÃºmero</button>
</div>

  </div>  <div class="list" id="list"></div>
</div><div class="toast" id="toast"></div><script>
const logo='https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg';
const toast=document.getElementById('toast');

function showToast(msg){
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2500);
}

function toggleTheme(){
  document.body.classList.toggle('light');
  showToast(document.body.classList.contains('light')?'Tema claro':'Tema escuro');
}

function sendNow(){
  const p=phone.value,m=message.value;
  if(!m)return showToast('Digite a mensagem');
  const url=p?`https://api.whatsapp.com/send/?phone=${p}&text=${encodeURIComponent(m)}&type=phone_number&app_absent=0`:`https://wa.me/?text=${encodeURIComponent(m)}`;
  window.open(url,'_blank');
}

function addMessage(){
  const p=phone.value,m=message.value;
  if(!m)return showToast('Digite a mensagem');

  const div=document.createElement('div');
  div.className='item';
  div.innerHTML=`
    <img src="${logo}" class="logo">
    ${p?`<div class="phone">${p}</div>`:''}
    <div class="message">${m}</div>
    <div class="item-actions">
      <button class="send">Enviar</button>
      <button class="remove">Remover</button>
    </div>`;

  div.querySelector('.send').onclick=()=>{
    const url=p?`https://api.whatsapp.com/send/?phone=${p}&text=${encodeURIComponent(m)}&type=phone_number&app_absent=0`:`https://wa.me/?text=${encodeURIComponent(m)}`;
    window.open(url,'_blank');
  };

  div.querySelector('.remove').onclick=()=>{
    div.remove();
    showToast('Mensagem removida');
  };

  list.prepend(div);
  message.value='';
  showToast('Mensagem adicionada');
}

function pasteNumber(){
  navigator.clipboard.readText().then(t=>{
    phone.value=t.replace(/[^0-9]/g,'');
    showToast('NÃºmero colado');
  });
}
</script></body>
</html>

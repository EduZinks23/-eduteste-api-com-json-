<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>WhatsApp Sender</title>

<style>
:root {
  --bg: #f2f2f2;
  --card: #ffffff;
  --text: #111111;
  --muted: #666666;
  --green: #25D366;
  --green2: #1ebe5d;
  --danger: #ff3b30;
}

body.dark {
  --bg: #0B141A;
  --card: #111B21;
  --text: #E9EDEF;
  --muted: #8696A0;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 16px;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

header img {
  width: 40px;
  height: 40px;
}

header span {
  flex: 1;
  font-weight: 600;
}

.toggle {
  background: var(--card);
  color: var(--text);
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input {
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.btn-send { background: var(--green); color: #fff; }
.btn-add { background: var(--green2); color: #fff; }

.list {
  margin-top: 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.logo-center {
  text-align: center;
  opacity: 0.25;
}

.logo-center img {
  width: 64px;
}

.item {
  background: var(--card);
  padding: 14px;
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  touch-action: pan-y;
  transition: transform .25s ease, opacity .25s ease;
}

.item.swiping {
  opacity: 0.8;
}

.item.removed {
  transform: translateX(-120%);
  opacity: 0;
}

.item-content {
  max-width: 70%;
}

.item-content span {
  font-size: 13px;
  color: var(--muted);
}

.actions {
  display: flex;
  gap: 6px;
}

.actions button {
  padding: 8px 10px;
  font-size: 13px;
}

.btn-remove {
  background: var(--danger);
  color: #fff;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  color: #fff;
  padding: 12px 18px;
  border-radius: 22px;
  opacity: 0;
  transition: opacity .3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
  <span>WhatsApp Sender</span>
  <button class="toggle" onclick="toggleTheme()">ðŸŒ™ / â˜€ï¸</button>
</header>

<div class="card">
  <input type="number" id="phone" placeholder="Numero (opcional)"
    oninput="this.value=this.value.replace(/\\D/g,'')">
  <input type="text" id="message" placeholder="Mensagem">

  <button class="btn-send" onclick="sendNow()">Enviar Mensagem</button>
  <button class="btn-add" onclick="addItem()">Adicionar a Lista</button>
</div>

<div class="list" id="list">
  <div class="logo-center">

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let startX = 0;

function toggleTheme() {
  document.body.classList.toggle('dark');
  showToast('Tema Alterado');
}

function showToast(msg) {
const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function sendNow() {
  const msg = message.value.trim();
  const phoneVal = phone.value.trim();
  if (!msg) return showToast('Digite a mensagem');

  const url = phoneVal
    ? `https://api.whatsapp.com/send/?phone=${phoneVal}&text=${encodeURIComponent(msg)}`
    : `https://wa.me/?text=${encodeURIComponent(msg)}`;

  window.open(url, '_blank');
}

function addItem() {
  const msg = message.value.trim();
  const phoneVal = phone.value.trim();
  if (!msg) return showToast('Digite a mensagem');

  const item = document.createElement('div');
  item.className = 'item';

  item.innerHTML = `
    <div class="item-content">
      ${phoneVal ? `<span>${phoneVal}</span><br>` : ''}${msg}
    </div>
    <div class="actions">
      <button onclick="sendItem('${phoneVal}','${encodeURIComponent(msg)}')">Enviar</button>
      <button class="btn-remove">Remover</button>
    </div>
  `;

  item.querySelector('.btn-remove').onclick = () => removeItem(item);
  enableSwipe(item);

  list.appendChild(item);
  message.value = '';
}

function sendItem(phone, msg) {
  const url = phone
    ? `https://api.whatsapp.com/send/?phone=${phone}&text=${msg}`
    : `https://wa.me/?text=${msg}`;
  window.open(url, '_blank');
}

function removeItem(item) {
  item.classList.add('removed');
  setTimeout(() => item.remove(), 250);
  showToast('Item removido');
}

function enableSwipe(el) {
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  });

  el.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    if (dx < 0) {
      el.style.transform = `translateX(${dx}px)`;
      el.classList.add('swiping');
    }
  });

  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    el.classList.remove('swiping');
    el.style.transform = '';
    if (dx < -120) removeItem(el);
  });
}
</script>

</body>
</html>

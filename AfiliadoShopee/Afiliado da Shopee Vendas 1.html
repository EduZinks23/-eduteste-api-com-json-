<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Ofertas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* CORES SHOPEE */

:root{
--laranja:#ee4d2d;
--bg:#f5f5f5;
}

body{
background:var(--bg);
}

/* HEADER */

header{
background:var(--laranja);
color:#fff;
padding:16px;
font-size:22px;
font-weight:bold;
text-align:center;
}

/* BUSCA */

.searchBox{
padding:10px;
background:#fff;
}

.searchBox input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

/* GRID PRODUTOS */

#produtos{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;

}

/* CARD */

.card{

background:#fff;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.08);
transition:.2s;

}

.card:hover{

transform:scale(1.02);

}

/* IMAGEM */

.card img{

width:100%;
aspect-ratio:1/1;
object-fit:cover;

}

/* INFO */

.info{

padding:8px;

}

.nome{

font-size:14px;
height:34px;
overflow:hidden;

}

.preco{

color:var(--laranja);
font-weight:bold;
margin-top:6px;
font-size:16px;

}

</style>
</head>

<body>

<header> Ofertas Shopee</header>

<div class="searchBox">
<input type="text" id="buscar" placeholder="Buscar produtos..." onkeyup="buscarProduto()">
</div>

<div id="produtos"></div>

<script>

/* PRODUTOS */

let produtos=[

{
nome:"Fone Bluetooth Gamer",
preco:"R$ 49,90",
img:"https://down-br.img.susercontent.com/file/br-11134207-7r98o-lm9n4s1c9h3o3a",
link:"SEU_LINK_AFILIADO"
},

{
nome:"Smartwatch D20",
preco:"R$ 39,90",
img:"https://down-br.img.susercontent.com/file/br-11134207-7r98o-lm9n4s1c9h3o3a",
link:"SEU_LINK_AFILIADO"
},

{
nome:"Luz LED RGB",
preco:"R$ 19,90",
img:"https://down-br.img.susercontent.com/file/br-11134207-7r98o-lm9n4s1c9h3o3a",
link:"SEU_LINK_AFILIADO"
}

]

let produtosDiv=document.getElementById("produtos")

function renderProdutos(lista){

let html=""

lista.forEach(p=>{

html+=`

<div class="card" onclick="abrirLink('${p.link}')">

<img src="${p.img}">

<div class="info">

<div class="nome">${p.nome}</div>

<div class="preco">${p.preco}</div>

</div>

</div>

`

})

produtosDiv.innerHTML=html

}

/* ABRIR LINK */

function abrirLink(link){

window.open(link,"_blank")

}

/* BUSCAR */

function buscarProduto(){

let texto=document
.getElementById("buscar")
.value
.toLowerCase()

let filtrados=produtos.filter(p=>
p.nome.toLowerCase().includes(texto)
)

renderProdutos(filtrados)

}

renderProdutos(produtos)

</script>

</body>
</html>

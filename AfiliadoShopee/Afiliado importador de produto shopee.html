<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Importador Shopee</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:#fff;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#ee4d2d;
color:#fff;
border:none;
border-radius:6px;
margin-top:10px;
font-weight:bold;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
padding:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>Importar Produto Shopee</h2>

<input id="nome" placeholder="Nome do produto">

<input id="preco" placeholder="Preþo (ex: R$39,90)">

<input id="imagem" placeholder="URL da imagem">

<input id="link" placeholder="Link afiliado Shopee">

<input id="categoria" placeholder="Categoria (gamer, casa, etc)">

<button onclick="gerar()">Gerar Produto</button>

<textarea id="saida" placeholder="Produto JSON gerado"></textarea>

</div>

<script>

function gerar(){

let nome=document.getElementById("nome").value
let preco=document.getElementById("preco").value
let img=document.getElementById("imagem").value
let link=document.getElementById("link").value
let cat=document.getElementById("categoria").value

let produto=

`{
nome:"${nome}",
preco:"${preco}",
categoria:"${cat}",
img:"${img}",
link:"${link}"
},`

document.getElementById("saida").value=produto

}

</script>

</body>
</html>

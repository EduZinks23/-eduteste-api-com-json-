<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Importador Shopee</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:#fff;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

textarea{
width:100%;
height:120px;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#ee4d2d;
color:#fff;
border:none;
border-radius:6px;
font-weight:bold;
}

#saida{
height:200px;
}

</style>

</head>

<body>

<div class="box">

<h2>Importar Produtos Shopee</h2>

<p>Cole vįrios links (um por linha)</p>

<textarea id="links"></textarea>

<button onclick="importar()">Importar Produtos</button>

<h3>JSON Gerado</h3>

<textarea id="saida"></textarea>

</div>

<script>

async function importar(){

let links=document
.getElementById("links")
.value
.split("\n")

let proxy="https://api.allorigins.win/raw?url="

let resultado=""

for(let link of links){

if(!link.trim()) continue

try{

let html=await fetch(proxy+encodeURIComponent(link))
.then(r=>r.text())

let nome=html.match(/property="og:title" content="(.*?)"/)?.[1] || "Produto"

let img=html.match(/property="og:image" content="(.*?)"/)?.[1] || ""

resultado+=`{
nome:"${nome}",
preco:"",
categoria:"",
img:"${img}",
link:"${link}"
},
`

}catch(e){

console.log("erro",link)

}

}

document.getElementById("saida").value=resultado

}

</script>

</body>
</html>

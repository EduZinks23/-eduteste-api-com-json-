<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ofertas Shopee</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

:root{
--shopee:#ee4d2d;
--bg:#f5f5f5;
}

body{
background:var(--bg);
}

/* HEADER */

header{
background:var(--shopee);
color:#fff;
padding:16px;
font-size:20px;
font-weight:bold;
text-align:center;
}

/* BUSCA */

.search{
background:#fff;
padding:10px;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

/* GRID */

#produtos{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;

}

/* CARD */

.card{

background:#fff;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.08);
position:relative;

}

/* DESCONTO */

.desconto{

position:absolute;
top:6px;
left:6px;
background:var(--shopee);
color:#fff;
font-size:12px;
padding:3px 6px;
border-radius:4px;

}

/* IMAGEM */

.card img{

width:100%;
aspect-ratio:1/1;
object-fit:cover;

}

/* INFO */

.info{

padding:8px;

}

.nome{

font-size:13px;
height:32px;
overflow:hidden;

}

.preco{

color:var(--shopee);
font-weight:bold;
font-size:16px;
margin-top:4px;

}

.avaliacao{

font-size:12px;
color:#ffa41c;
margin-top:3px;

}

.frete{

font-size:11px;
color:green;
margin-top:2px;

}

/* BOTĂO */

.btn{

margin-top:6px;
background:var(--shopee);
color:#fff;
border:none;
width:100%;
padding:7px;
border-radius:5px;
font-size:13px;

}

</style>
</head>

<body>

<header> Ofertas Imperdíveis</header>

<div class="search">
<input type="text" placeholder="Buscar produto..." id="buscar" onkeyup="buscarProduto()">
</div>

<div id="produtos"></div>

<script>

/* PRODUTOS */

let produtos=[

{
nome:"Smartwatch D20 Bluetooth",
preco:"R$ 39,90",
img:"https://down-br.img.susercontent.com/file/br-11134207-7r98o-lm9n4s1c9h3o3a",
link:"SEU_LINK_AFILIADO",
desconto:"-40%",
avaliacao:" (1.2k)",
frete:"Frete grátis"
},

{
nome:"Fone Bluetooth Gamer RGB",
preco:"R$ 49,90",
img:"https://down-br.img.susercontent.com/file/br-11134207-7r98o-lm9n4s1c9h3o3a",
link:"SEU_LINK_AFILIADO",
desconto:"-30%",
avaliacao:" (3k)",
frete:"Frete grátis"
},

{
nome:"Luz LED RGB 5m",
preco:"R$ 19,90",
img:"https://down-br.img.susercontent.com/file/br-11134207-7r98o-lm9n4s1c9h3o3a",
link:"SEU_LINK_AFILIADO",
desconto:"-50%",
avaliacao:" (800)",
frete:"Frete grátis"
}

]

let produtosDiv=document.getElementById("produtos")

function render(lista){

let html=""

lista.forEach(p=>{

html+=`

<div class="card">

<div class="desconto">${p.desconto}</div>

<img src="${p.img}">

<div class="info">

<div class="nome">${p.nome}</div>

<div class="preco">${p.preco}</div>

<div class="avaliacao">${p.avaliacao}</div>

<div class="frete">${p.frete}</div>

<button class="btn" onclick="abrirLink('${p.link}')">
Ver Oferta
</button>

</div>

</div>

`

})

produtosDiv.innerHTML=html

}

/* ABRIR LINK */

function abrirLink(link){

window.open(link,"_blank")

}

/* BUSCAR */

function buscarProduto(){

let texto=document
.getElementById("buscar")
.value
.toLowerCase()

let filtrado=produtos.filter(p=>
p.nome.toLowerCase().includes(texto)
)

render(filtrado)

}

render(produtos)

</script>

</body>
</html>
